<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHL — Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root { --bg:#080a0c;--card:#0e1318;--card2:#141820;--border:#1e2832;--accent:#c0392b;--accent2:#e74c3c;--gold:#d4a843;--text:#e8eaf0;--muted:#6b7585;--green:#27ae60;--blue:#2980b9;--orange:#e67e22;--purple:#8e44ad; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(192,57,43,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(192,57,43,.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0;}
  nav{position:fixed;top:0;left:0;right:0;height:64px;background:rgba(8,10,12,.95);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 30px;z-index:100;backdrop-filter:blur(10px);}
  nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5;}
  .nav-brand{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:6px;color:var(--text);text-decoration:none;margin-right:auto;}
  .nav-brand span{color:var(--accent);}
  .nav-link{padding:8px 18px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--muted);text-decoration:none;border-radius:2px;transition:all .2s;border:1px solid transparent;}
  .nav-link:hover,.nav-link.active{color:var(--text);background:var(--card2);border-color:var(--border);}
  .nav-link.active{color:var(--accent);border-color:rgba(192,57,43,.3);}
  .btn-logout{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;padding:6px 14px;cursor:pointer;border-radius:2px;transition:all .2s;margin-left:16px;}
  .btn-logout:hover{border-color:var(--accent);color:var(--accent);}
  main{padding-top:64px;min-height:100vh;position:relative;z-index:1;}
  .container{max-width:1000px;margin:0 auto;padding:40px 30px;}
  .page-header{margin-bottom:40px;}
  .page-label{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--accent);margin-bottom:10px;}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px;}
  .page-sub{color:var(--muted);font-size:14px;margin-top:8px;}

  /* STATS ROW */
  .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:36px;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:18px 20px;}
  .stat-card-value{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;}
  .stat-card-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);margin-top:4px;}

  /* USER TABLE */
  .table-container{background:var(--card);border:1px solid var(--border);border-radius:2px;overflow:hidden;margin-bottom:32px;}
  .table-header{padding:16px 24px;background:var(--card2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;}
  .table-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;}
  .table-search{flex:1;max-width:300px;margin-left:auto;}
  .search-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:8px 14px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;outline:none;}
  .search-input:focus{border-color:var(--accent);}
  .search-input::placeholder{color:var(--muted);}

  table{width:100%;border-collapse:collapse;}
  thead th{padding:12px 20px;text-align:left;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;}
  tbody tr{border-bottom:1px solid rgba(30,40,50,.5);transition:background .2s;}
  tbody tr:hover{background:var(--card2);}
  tbody tr:last-child{border-bottom:none;}
  td{padding:14px 20px;font-size:14px;}
  .td-username{font-weight:600;font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:1px;}
  .td-id{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);}
  .td-date{font-size:12px;color:var(--muted);}

  /* Etiquette select */
  .etiquette-select{background:var(--card2);border:1px solid var(--border);border-radius:2px;padding:6px 12px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;outline:none;transition:all .2s;}
  .etiquette-select:focus{border-color:var(--accent);}
  .etiquette-select:hover{border-color:var(--muted);}

  /* Badges */
  .badge{display:inline-block;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:2px;border:1px solid;}
  .badge-Stagiaire{color:var(--green);border-color:rgba(39,174,96,.4);background:rgba(39,174,96,.08);}
  .badge-Infirmier{color:var(--blue);border-color:rgba(41,128,185,.4);background:rgba(41,128,185,.08);}
  .badge-AM{color:var(--orange);border-color:rgba(230,126,34,.4);background:rgba(230,126,34,.08);}
  .badge-Medecin{color:var(--gold);border-color:rgba(212,168,67,.4);background:rgba(212,168,67,.08);}
  .badge-Direction{color:var(--accent2);border-color:rgba(231,76,60,.4);background:rgba(231,76,60,.08);}

  /* Toast */
  .toast{position:fixed;bottom:30px;right:30px;padding:14px 20px;border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;transform:translateY(80px);opacity:0;transition:all .3s;z-index:999;border:1px solid;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.success{background:rgba(39,174,96,.15);border-color:rgba(39,174,96,.4);color:var(--green);}
  .toast.error{background:rgba(192,57,43,.15);border-color:rgba(192,57,43,.4);color:var(--accent2);}

  /* Add user */
  .add-form{background:var(--card);border:1px solid rgba(192,57,43,.3);border-radius:2px;padding:28px;margin-bottom:32px;}
  .add-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:var(--accent);margin-bottom:20px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:end;}
  .form-col{display:flex;flex-direction:column;gap:6px;}
  .form-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);}
  .form-input{background:var(--card2);border:1px solid var(--border);border-radius:2px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all .2s;}
  .form-input:focus{border-color:var(--accent);}
  .form-select{background:var(--card2);border:1px solid var(--border);border-radius:2px;padding:10px 14px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;cursor:pointer;}
  .btn-add{padding:10px 22px;background:var(--accent);border:none;color:white;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;border-radius:2px;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .btn-add:hover{background:var(--accent2);}

  /* Spinner */
  .loading{text-align:center;padding:30px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:3px;}
  .empty{text-align:center;padding:40px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;border:1px dashed var(--border);border-radius:2px;}
</style>
</head>
<body>
<nav>
  <a href="home.html" class="nav-brand">C<span>H</span>L</a>
  <a href="home.html" class="nav-link">ACCUEIL</a>
  <a href="cours.html" class="nav-link">COURS</a>
  <a href="examen.html" class="nav-link">EXAMENS</a>
  <a href="admin.html" class="nav-link active">ADMIN</a>
  <a href="resultats.html" class="nav-link">RÉSULTATS</a>
  <button class="btn-logout" onclick="logout()">DÉCONNEXION</button>
</nav>

<div class="toast" id="toast"></div>

<main>
  <div class="container">
    <div class="page-header">
      <div class="page-label">DIRECTION // ACCÈS RESTREINT</div>
      <div class="page-title">ADMINISTRATION</div>
      <div class="page-sub">Gestion des utilisateurs et des étiquettes d'accès</div>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-card-value" id="totalUsers">—</div><div class="stat-card-label">UTILISATEURS</div></div>
      <div class="stat-card"><div class="stat-card-value" style="color:var(--green)" id="totalStagiaire">—</div><div class="stat-card-label">STAGIAIRES</div></div>
      <div class="stat-card"><div class="stat-card-value" style="color:var(--blue)" id="totalInfirmier">—</div><div class="stat-card-label">INFIRMIERS</div></div>
      <div class="stat-card"><div class="stat-card-value" style="color:var(--orange)" id="totalApprentis">—</div><div class="stat-card-label">APPRENTIS MÉD.</div></div>
      <div class="stat-card"><div class="stat-card-value" style="color:var(--gold)" id="totalMedecin">—</div><div class="stat-card-label">MÉDECINS</div></div>
    </div>

    <!-- AJOUTER UTILISATEUR -->
    <div class="add-form">
      <div class="add-title">AJOUTER UN UTILISATEUR</div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">IDENTIFIANT</label>
          <input type="text" class="form-input" id="newUsername" placeholder="username">
        </div>
        <div class="form-col">
          <label class="form-label">MOT DE PASSE</label>
          <input type="password" class="form-input" id="newPassword" placeholder="••••••••">
        </div>
        <div class="form-col">
          <label class="form-label">ÉTIQUETTE</label>
          <select class="form-select" id="newEtiquette">
            <option value="Stagiaire">Stagiaire</option>
            <option value="Infirmier">Infirmier</option>
            <option value="Apprenti Médecin">Apprenti Médecin</option>
            <option value="Médecin">Médecin</option>
            <option value="Direction">Direction</option>
          </select>
        </div>
        <button class="btn-add" onclick="addUser()">+ AJOUTER</button>
      </div>
    </div>

    <!-- TABLE UTILISATEURS -->
    <div class="table-container">
      <div class="table-header">
        <div class="table-title">UTILISATEURS</div>
        <div class="table-search">
          <input type="text" class="search-input" placeholder="RECHERCHER..." oninput="filterUsers(this.value)">
        </div>
      </div>
      <div id="usersTableWrapper">
        <div class="loading">CHARGEMENT...</div>
      </div>
    </div>
  </div>
</main>

<script>
  const SUPABASE_URL = 'VOTRE_URL_SUPABASE';
  const SUPABASE_KEY = 'VOTRE_CLE_ANON_SUPABASE';

  function getSession() { const s = sessionStorage.getItem('chl_user'); return s ? JSON.parse(s) : null; }
  const user = getSession();
  if (!user || user.etiquette !== 'Direction') { window.location.href = 'home.html'; }
  function logout() { sessionStorage.removeItem('chl_user'); window.location.href = 'index.html'; }

  let allUsers = [];

  const ETIQUETTES = ['Stagiaire','Infirmier','Apprenti Médecin','Médecin','Direction'];
  const ET_BADGE = { 'Stagiaire':'badge-Stagiaire','Infirmier':'badge-Infirmier','Apprenti Médecin':'badge-AM','Médecin':'badge-Medecin','Direction':'badge-Direction' };

  async function loadUsers() {
    const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };
    const res = await fetch(`${SUPABASE_URL}/rest/v1/users?order=created_at.desc&select=id,username,etiquette,created_at`, { headers });
    allUsers = await res.json();
    updateStats();
    renderTable(allUsers);
  }

  function updateStats() {
    document.getElementById('totalUsers').textContent = allUsers.length;
    ['Stagiaire','Infirmier','Apprenti Médecin','Médecin'].forEach(et => {
      const count = allUsers.filter(u => u.etiquette === et).length;
      const ids = { 'Stagiaire':'totalStagiaire','Infirmier':'totalInfirmier','Apprenti Médecin':'totalApprentis','Médecin':'totalMedecin' };
      document.getElementById(ids[et]).textContent = count;
    });
  }

  function renderTable(users) {
    if (!users.length) {
      document.getElementById('usersTableWrapper').innerHTML = '<div class="empty">AUCUN UTILISATEUR TROUVÉ</div>';
      return;
    }
    document.getElementById('usersTableWrapper').innerHTML = `
      <table>
        <thead><tr>
          <th>IDENTIFIANT</th>
          <th>ÉTIQUETTE</th>
          <th>CRÉÉ LE</th>
          <th>ID</th>
          <th>ACTIONS</th>
        </tr></thead>
        <tbody>
          ${users.map(u => `
            <tr id="row-${u.id}">
              <td class="td-username">${u.username}</td>
              <td>
                <select class="etiquette-select" onchange="updateEtiquette('${u.id}', this.value)">
                  ${ETIQUETTES.map(et => `<option value="${et}" ${et === u.etiquette ? 'selected' : ''}>${et}</option>`).join('')}
                </select>
              </td>
              <td class="td-date">${new Date(u.created_at).toLocaleDateString('fr-BE')}</td>
              <td class="td-id">${u.id.substring(0,8)}...</td>
              <td>
                <button onclick="deleteUser('${u.id}', '${u.username}')" 
                  style="background:none;border:1px solid rgba(192,57,43,.3);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;padding:4px 10px;border-radius:2px;cursor:pointer;transition:all .2s"
                  onmouseover="this.style.background='rgba(192,57,43,.15)'" onmouseout="this.style.background='none'">
                  SUPPR.
                </button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  function filterUsers(q) {
    const filtered = allUsers.filter(u => 
      u.username.toLowerCase().includes(q.toLowerCase()) || 
      u.etiquette.toLowerCase().includes(q.toLowerCase())
    );
    renderTable(filtered);
  }

  async function updateEtiquette(userId, newEt) {
    const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };
    const res = await fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${userId}`, {
      method: 'PATCH', headers,
      body: JSON.stringify({ etiquette: newEt, updated_at: new Date().toISOString() })
    });
    if (res.ok) {
      const u = allUsers.find(u => u.id === userId);
      if (u) u.etiquette = newEt;
      updateStats();
      showToast('✓ ÉTIQUETTE MISE À JOUR', 'success');
    } else {
      showToast('✗ ERREUR MISE À JOUR', 'error');
    }
  }

  async function deleteUser(userId, username) {
    if (!confirm(`Supprimer l'utilisateur "${username}" ?`)) return;
    const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };
    const res = await fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${userId}`, { method: 'DELETE', headers });
    if (res.ok || res.status === 204) {
      allUsers = allUsers.filter(u => u.id !== userId);
      updateStats();
      renderTable(allUsers);
      showToast('✓ UTILISATEUR SUPPRIMÉ', 'success');
    } else {
      showToast('✗ ERREUR SUPPRESSION', 'error');
    }
  }

  async function addUser() {
    const username = document.getElementById('newUsername').value.trim();
    const password = document.getElementById('newPassword').value;
    const etiquette = document.getElementById('newEtiquette').value;
    if (!username || !password) { showToast('✗ REMPLISSEZ TOUS LES CHAMPS', 'error'); return; }
    
    const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };
    // Note: en production, hasher le mot de passe côté Edge Function
    const res = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
      method: 'POST', headers,
      body: JSON.stringify({ username, password_hash: password, etiquette })
    });
    if (res.ok || res.status === 201) {
      document.getElementById('newUsername').value = '';
      document.getElementById('newPassword').value = '';
      showToast('✓ UTILISATEUR CRÉÉ', 'success');
      loadUsers();
    } else {
      const err = await res.json();
      showToast('✗ ' + (err.message || 'ERREUR CRÉATION'), 'error');
    }
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  loadUsers().catch(e => {
    document.getElementById('usersTableWrapper').innerHTML = '<div class="empty">ERREUR DE CONNEXION SUPABASE</div>';
  });
</script>
</body>
</html>
