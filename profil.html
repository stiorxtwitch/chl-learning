<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHL — Mon Profil</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080a0c;
    --card:    #0e1318;
    --card2:   #141820;
    --border:  #1e2832;
    --accent:  #c0392b;
    --accent2: #e74c3c;
    --gold:    #d4a843;
    --text:    #e8eaf0;
    --muted:   #6b7585;
    --green:   #27ae60;
    --blue:    #2980b9;
    --orange:  #e67e22;
    --purple:  #8e44ad;
    --teal:    #16a085;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:linear-gradient(rgba(192,57,43,.03)1px,transparent 1px),linear-gradient(90deg,rgba(192,57,43,.03)1px,transparent 1px);
    background-size:50px 50px;
  }

  /* NAV */
  nav {
    position:fixed; top:0; left:0; right:0; height:64px;
    background:rgba(8,10,12,.95); border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 30px; z-index:100;
    backdrop-filter:blur(10px);
  }
  nav::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:.5; }
  .nav-brand { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:6px; color:var(--text); text-decoration:none; margin-right:auto; }
  .nav-brand span { color:var(--accent); }
  .nav-links { display:flex; gap:4px; }
  .nav-link { padding:8px 16px; font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px; color:var(--muted); text-decoration:none; border-radius:2px; transition:all .2s; border:1px solid transparent; }
  .nav-link:hover,.nav-link.active { color:var(--text); background:var(--card2); border-color:var(--border); }
  .nav-link.active { color:var(--accent); border-color:rgba(192,57,43,.3); }
  .btn-logout { background:none; border:1px solid var(--border); color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; padding:6px 14px; cursor:pointer; border-radius:2px; transition:all .2s; margin-left:16px; }
  .btn-logout:hover { border-color:var(--accent); color:var(--accent); }

  main { padding-top:64px; min-height:100vh; position:relative; z-index:1; }
  .container { max-width:960px; margin:0 auto; padding:48px 30px; }

  /* ── HERO PROFIL ── */
  .profile-hero {
    display:grid; grid-template-columns:auto 1fr; gap:32px;
    align-items:center; margin-bottom:48px;
    background:var(--card); border:1px solid var(--border); border-radius:2px;
    padding:36px 40px; position:relative; overflow:hidden;
  }
  .profile-hero::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);
  }
  /* Déco coin droit */
  .profile-hero::after {
    content:''; position:absolute; right:-60px; top:-60px;
    width:200px; height:200px; border-radius:50%;
    background:radial-gradient(circle,rgba(192,57,43,.08),transparent 70%);
    pointer-events:none;
  }

  /* Avatar */
  .avatar {
    width:100px; height:100px; border-radius:2px;
    background:var(--card2); border:2px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    position:relative; flex-shrink:0;
  }
  .avatar-letter {
    font-family:'Bebas Neue',sans-serif; font-size:52px;
    color:var(--accent); line-height:1;
  }
  .avatar-ring {
    position:absolute; inset:-6px; border-radius:4px;
    border:1px solid rgba(192,57,43,.3);
    animation:ring-pulse 3s ease-in-out infinite;
  }
  @keyframes ring-pulse { 0%,100%{opacity:.4;transform:scale(1)} 50%{opacity:.9;transform:scale(1.02)} }

  .profile-info { }
  .profile-label {
    font-family:'Share Tech Mono',monospace; font-size:10px;
    letter-spacing:4px; color:var(--accent); margin-bottom:6px;
  }
  .profile-name {
    font-family:'Bebas Neue',sans-serif; font-size:52px;
    letter-spacing:4px; line-height:1; margin-bottom:12px;
    text-shadow:0 0 30px rgba(192,57,43,.2);
  }
  .profile-meta { display:flex; gap:16px; flex-wrap:wrap; }
  .meta-item {
    display:flex; align-items:center; gap:8px;
    font-family:'Share Tech Mono',monospace; font-size:10px;
    letter-spacing:2px; color:var(--muted);
  }
  .meta-item span { color:var(--text); font-size:12px; }

  /* Étiquette de rôle colorée */
  .role-badge {
    display:inline-flex; align-items:center; gap:8px;
    padding:6px 16px; border-radius:2px; border:1px solid;
    font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px;
  }
  .role-Stagiaire       { color:var(--green);  border-color:rgba(39,174,96,.4);  background:rgba(39,174,96,.08); }
  .role-Infirmier       { color:var(--blue);   border-color:rgba(41,128,185,.4); background:rgba(41,128,185,.08); }
  .role-Apprenti        { color:var(--orange); border-color:rgba(230,126,34,.4); background:rgba(230,126,34,.08); }
  .role-Médecin         { color:var(--gold);   border-color:rgba(212,168,67,.4); background:rgba(212,168,67,.08); }
  .role-Direction       { color:var(--accent2);border-color:rgba(231,76,60,.4);  background:rgba(231,76,60,.08); }

  /* ── STATS ROW ── */
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:40px; }
  .stat-card {
    background:var(--card); border:1px solid var(--border); border-radius:2px;
    padding:20px 22px; text-align:center;
  }
  .stat-value { font-family:'Bebas Neue',sans-serif; font-size:40px; line-height:1; }
  .stat-label { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--muted); margin-top:4px; }

  /* ── SECTION ── */
  .section-header {
    display:flex; align-items:center; gap:16px; margin-bottom:20px;
  }
  .section-title {
    font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:4px;
  }
  .section-line { flex:1; height:1px; background:var(--border); }
  .section-sub { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:2px; }

  /* ── BADGES GRID ── */
  .badges-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:14px; margin-bottom:48px;
  }

  .badge-card {
    background:var(--card); border:1px solid var(--border); border-radius:2px;
    padding:20px 22px; position:relative; overflow:hidden;
    animation:badge-in .4s ease forwards;
    opacity:0; transform:translateY(8px);
  }
  @keyframes badge-in { to{opacity:1;transform:translateY(0)} }

  .badge-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0;
    width:3px; border-radius:2px 0 0 2px;
  }
  .badge-card::after {
    content:''; position:absolute; right:-30px; top:-30px;
    width:100px; height:100px; border-radius:50%;
    opacity:.05; pointer-events:none;
  }

  /* Couleurs par niveau */
  .badge-Stagiaire::before       { background:var(--green); }
  .badge-Stagiaire::after        { background:var(--green); }
  .badge-Infirmier::before       { background:var(--blue); }
  .badge-Infirmier::after        { background:var(--blue); }
  .badge-Apprenti::before        { background:var(--orange); }
  .badge-Apprenti::after         { background:var(--orange); }
  .badge-Médecin::before         { background:var(--gold); }
  .badge-Médecin::after          { background:var(--gold); }

  .badge-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .badge-icon {
    width:44px; height:44px; border-radius:2px;
    display:flex; align-items:center; justify-content:center;
    font-size:22px; flex-shrink:0; border:1px solid;
  }
  .badge-icon-Stagiaire  { background:rgba(39,174,96,.1);  border-color:rgba(39,174,96,.3); }
  .badge-icon-Infirmier  { background:rgba(41,128,185,.1); border-color:rgba(41,128,185,.3); }
  .badge-icon-Apprenti   { background:rgba(230,126,34,.1); border-color:rgba(230,126,34,.3); }
  .badge-icon-Médecin    { background:rgba(212,168,67,.1); border-color:rgba(212,168,67,.3); }

  .badge-meta { flex:1; }
  .badge-niveau {
    font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; margin-bottom:3px;
  }
  .badge-nom { font-weight:600; font-size:14px; line-height:1.3; }

  .badge-desc { font-size:12px; color:var(--muted); line-height:1.5; margin-bottom:10px; }
  .badge-date { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:1px; }
  .badge-shine {
    position:absolute; inset:0; border-radius:2px;
    background:linear-gradient(135deg,rgba(255,255,255,.03),transparent 50%);
    pointer-events:none;
  }

  /* Badge verrouillé */
  .badge-card.locked {
    opacity:.25 !important; filter:grayscale(1);
    transform:none !important;
  }
  .badge-card.locked::before { background:var(--muted); }

  /* ── PROGRESSION DES COURS ── */
  .cours-list { display:flex; flex-direction:column; gap:10px; margin-bottom:48px; }
  .cours-item {
    background:var(--card); border:1px solid var(--border); border-radius:2px;
    padding:16px 20px; display:flex; align-items:center; gap:16px;
  }
  .cours-icon { font-size:20px; flex-shrink:0; width:32px; text-align:center; }
  .cours-body { flex:1; }
  .cours-name { font-size:14px; font-weight:500; margin-bottom:4px; }
  .cours-bar-wrap { display:flex; align-items:center; gap:10px; }
  .cours-bar { flex:1; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
  .cours-bar-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .6s ease; }
  .cours-pct { font-family:'Bebas Neue',sans-serif; font-size:16px; color:var(--accent); flex-shrink:0; width:40px; text-align:right; }
  .cours-check { font-size:16px; flex-shrink:0; }

  /* ── ÉTAT VIDE ── */
  .empty-state {
    text-align:center; padding:48px 20px;
    font-family:'Share Tech Mono',monospace; font-size:11px;
    color:var(--muted); letter-spacing:2px;
    border:1px dashed var(--border); border-radius:2px;
  }
  .empty-icon { font-size:36px; margin-bottom:12px; opacity:.4; }

  /* ── LOADING ── */
  .skeleton {
    background:linear-gradient(90deg,var(--card2) 25%,var(--card) 50%,var(--card2) 75%);
    background-size:200% 100%;
    animation:shimmer 1.5s infinite;
    border-radius:2px; height:20px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  @media(max-width:700px) {
    .profile-hero { grid-template-columns:1fr; text-align:center; }
    .avatar { margin:0 auto; }
    .profile-meta { justify-content:center; }
    .stats-row { grid-template-columns:repeat(2,1fr); }
  }
</style>
</head>
<body>

<nav>
  <a href="home.html" class="nav-brand">C<span>H</span>L</a>
  <div class="nav-links">
    <a href="home.html"    class="nav-link">ACCUEIL</a>
    <a href="cours.html"   class="nav-link">COURS</a>
    <a href="examen.html"  class="nav-link">EXAMENS</a>
    <a href="profil.html"  class="nav-link active">PROFIL</a>
    <span id="dirNav" style="display:none">
      <a href="effectifs.html" class="nav-link">EFFECTIFS</a>
      <a href="admin.html"     class="nav-link">ADMIN</a>
      <a href="resultats.html" class="nav-link">RÉSULTATS</a>
    </span>
  </div>
  <button class="btn-logout" onclick="logout()">DÉCONNEXION</button>
</nav>

<main>
  <div class="container" id="pageContent">
    <!-- Chargement -->
    <div style="padding:60px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:3px">
      CHARGEMENT DU PROFIL...
    </div>
  </div>
</main>

<script>
const SUPABASE_URL = 'VOTRE_URL_SUPABASE';
const SUPABASE_KEY = 'VOTRE_CLE_ANON_SUPABASE';

function getSession() { const s = sessionStorage.getItem('chl_user'); return s ? JSON.parse(s) : null; }
const user = getSession();
if (!user) window.location.href = 'index.html';
function logout() { sessionStorage.removeItem('chl_user'); window.location.href = 'index.html'; }

if (user.etiquette === 'Direction') document.getElementById('dirNav').style.display = 'inline';

// ── Catalogue complet des badges (lié aux UUID fixes des examens) ──
const BADGE_CATALOGUE = {
  'aaaaaaaa-0001-0000-0000-000000000001': {
    nom:         'Brevet Acronymes & Vocabulaire',
    description: 'Maîtrise du vocabulaire médical militaire fondamental (MARCH, GCS, SAMPLE, OPQRST...)',
    icone:       '📖', niveau: 'Stagiaire', couleur: '#27ae60'
  },
  'aaaaaaaa-0002-0000-0000-000000000001': {
    nom:         'Brevet Basic Life Support',
    description: 'Certification RCP adulte/enfant, DEA, PLS, gestion des urgences courantes.',
    icone:       '🫀', niveau: 'Stagiaire', couleur: '#27ae60'
  },
  'aaaaaaaa-0003-0000-0000-000000000001': {
    nom:         'Brevet TCCC/TECC Tactique',
    description: 'Soins tactiques sous feu, protocole MARCH, pharmacologie de combat.',
    icone:       '⚕️', niveau: 'Infirmier', couleur: '#2980b9'
  },
  'aaaaaaaa-0004-0000-0000-000000000001': {
    nom:         'Brevet Soins d\'Urgence Avancés',
    description: 'ABCDE, RCP avancée ERC 2025, triage START, pharmacologie des urgences.',
    icone:       '🚑', niveau: 'Infirmier', couleur: '#2980b9'
  },
  'aaaaaaaa-0005-0000-0000-000000000001': {
    nom:         'Brevet Techniques d\'Injection',
    description: 'Maîtrise des voies IV, IM, SC et ID avec dosages médicamenteux.',
    icone:       '💉', niveau: 'Infirmier', couleur: '#2980b9'
  },
  'aaaaaaaa-0006-0000-0000-000000000001': {
    nom:         'Brevet Anatomie Cardiovasculaire',
    description: 'Cœur, poumons, SNA, nœud sinusal, débit cardiaque, cycle PQRST.',
    icone:       '🫁', niveau: 'Apprenti Médecin', couleur: '#e67e22'
  },
  'aaaaaaaa-0007-0000-0000-000000000001': {
    nom:         'Brevet OPEX & Pathologies Tropicales',
    description: 'Déploiement extérieur, agents CBRN, blast injuries, pathologies tropicales.',
    icone:       '🪖', niveau: 'Apprenti Médecin', couleur: '#e67e22'
  },
  'aaaaaaaa-0008-0000-0000-000000000001': {
    nom:         'Brevet Interprétation ECG',
    description: 'Lecture ECG 12 dérivations, STEMI, FA, troubles électrolytiques.',
    icone:       '📈', niveau: 'Médecin', couleur: '#d4a843'
  },
  'aaaaaaaa-0009-0000-0000-000000000001': {
    nom:         'Brevet Suture Chirurgicale',
    description: 'Techniques de suture, matériel, principes d\'éversion, gestion des complications.',
    icone:       '🩺', niveau: 'Médecin', couleur: '#d4a843'
  },
};

// Couleurs par étiquette
const ET_COLOR = {
  'Stagiaire':       '#27ae60',
  'Infirmier':       '#2980b9',
  'Apprenti Médecin':'#e67e22',
  'Médecin':         '#d4a843',
  'Direction':       '#e74c3c',
};
const ET_CLASS = {
  'Stagiaire':'Stagiaire','Infirmier':'Infirmier',
  'Apprenti Médecin':'Apprenti','Médecin':'Médecin','Direction':'Direction'
};

function getIcon(titre) {
  const t = titre.toLowerCase();
  if (t.includes('bls')||t.includes('secours')) return '🫀';
  if (t.includes('ecg')) return '📈';
  if (t.includes('injection')) return '💉';
  if (t.includes('suture')) return '🩺';
  if (t.includes('anatomie')) return '🫁';
  if (t.includes('tccc')) return '⚕️';
  if (t.includes('opex')) return '🪖';
  return '📋';
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('fr-BE', { year:'numeric', month:'long', day:'numeric' });
}

// ── Charge toutes les données du profil ──
async function loadProfile() {
  const h = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };

  const [userRes, badgesRes, resultatsRes, coursRes, progRes] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${user.id}&select=*`, { headers: h }),
    fetch(`${SUPABASE_URL}/rest/v1/badges?user_id=eq.${user.id}&order=obtenu_le.asc`, { headers: h }),
    fetch(`${SUPABASE_URL}/rest/v1/resultats?user_id=eq.${user.id}&select=*`, { headers: h }),
    fetch(`${SUPABASE_URL}/rest/v1/cours?actif=eq.true&order=etiquette_requise,ordre`, { headers: h }),
    fetch(`${SUPABASE_URL}/rest/v1/progression?user_id=eq.${user.id}&select=*`, { headers: h }),
  ]);

  const [userData] = await userRes.json();
  const badges     = await badgesRes.json();
  const resultats  = await resultatsRes.json();
  const cours      = await coursRes.json();
  const progs      = await progRes.json();

  // Map progression
  const progMap = {};
  progs.forEach(p => progMap[p.cours_id] = p);

  // Map badges obtenus
  const badgeMap = {};
  badges.forEach(b => badgeMap[b.examen_id] = b);

  // Calcul stats
  const totalExamens   = resultats.length;
  const examensReussis = resultats.filter(r => r.valide).length;
  const scoresMoy      = resultats.length ? Math.round(resultats.reduce((s,r)=>s+(r.score||0),0)/resultats.length) : 0;
  const coursTermines  = progs.filter(p => p.termine).length;

  renderPage(userData, badges, badgeMap, resultats, cours, progMap, {
    totalExamens, examensReussis, scoresMoy, coursTermines
  });
}

function renderPage(userData, badges, badgeMap, resultats, cours, progMap, stats) {
  const etClass = ET_CLASS[userData.etiquette] || 'Stagiaire';
  const etColor = ET_COLOR[userData.etiquette] || 'var(--muted)';

  // ── Hero ──
  let heroHTML = `
    <div class="profile-hero">
      <div class="avatar">
        <div class="avatar-ring"></div>
        <div class="avatar-letter">${userData.username.charAt(0).toUpperCase()}</div>
      </div>
      <div class="profile-info">
        <div class="profile-label">DOSSIER PERSONNEL</div>
        <div class="profile-name">${userData.username.toUpperCase()}</div>
        <div class="profile-meta">
          <div class="meta-item">GRADE <span class="role-badge role-${etClass}">${userData.etiquette.toUpperCase()}</span></div>
          <div class="meta-item">MEMBRE DEPUIS <span>${formatDate(userData.created_at)}</span></div>
          <div class="meta-item">BADGES <span style="color:${etColor};font-size:16px;font-family:'Bebas Neue',sans-serif">${badges.length}</span></div>
        </div>
      </div>
    </div>`;

  // ── Stats ──
  let statsHTML = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" style="color:${etColor}">${badges.length}</div>
        <div class="stat-label">BREVETS OBTENUS</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--green)">${stats.examensReussis}</div>
        <div class="stat-label">EXAMENS RÉUSSIS</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--gold)">${stats.scoresMoy}%</div>
        <div class="stat-label">SCORE MOYEN</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--teal)">${stats.coursTermines}</div>
        <div class="stat-label">COURS TERMINÉS</div>
      </div>
    </div>`;

  // ── Badges ──
  const allExamenIds = Object.keys(BADGE_CATALOGUE);
  let badgesHTML = `
    <div class="section-header">
      <div class="section-title">🎖️ MES BREVETS</div>
      <div class="section-line"></div>
      <div class="section-sub">${badges.length} / ${allExamenIds.length} OBTENUS</div>
    </div>
    <div class="badges-grid">`;

  // D'abord les badges obtenus, puis les verrouillés
  const obtained  = allExamenIds.filter(id => badgeMap[id]);
  const locked    = allExamenIds.filter(id => !badgeMap[id]);
  const ordered   = [...obtained, ...locked];

  ordered.forEach((examId, i) => {
    const cat     = BADGE_CATALOGUE[examId];
    const owned   = !!badgeMap[examId];
    const bData   = badgeMap[examId];
    const niv     = cat.niveau.replace(' Médecin','').replace('Apprenti','Apprenti');
    const nivKey  = cat.niveau === 'Apprenti Médecin' ? 'Apprenti' : cat.niveau;

    badgesHTML += `
      <div class="badge-card badge-${nivKey} ${owned ? '' : 'locked'}"
           style="animation-delay:${i * 0.06}s">
        <div class="badge-shine"></div>
        <div class="badge-top">
          <div class="badge-icon badge-icon-${nivKey}">${owned ? cat.icone : '🔒'}</div>
          <div class="badge-meta">
            <div class="badge-niveau" style="color:${cat.couleur}">${cat.niveau.toUpperCase()}</div>
            <div class="badge-nom">${cat.nom}</div>
          </div>
        </div>
        <div class="badge-desc">${cat.description}</div>
        <div class="badge-date">
          ${owned
            ? `✓ Obtenu le ${formatDate(bData.obtenu_le)}`
            : '🔒 Non obtenu — Réussissez l\'examen correspondant'}
        </div>
      </div>`;
  });
  badgesHTML += '</div>';

  // ── Progression des cours ──
  const HIER = ['Stagiaire','Infirmier','Apprenti Médecin','Médecin','Direction'];
  function canAccess(req) {
    if (userData.etiquette === 'Direction') return true;
    return HIER.indexOf(userData.etiquette) >= HIER.indexOf(req);
  }

  const accessibleCours = cours.filter(c => canAccess(c.etiquette_requise));

  let coursHTML = `
    <div class="section-header">
      <div class="section-title">📚 PROGRESSION DES COURS</div>
      <div class="section-line"></div>
      <div class="section-sub">${stats.coursTermines} / ${accessibleCours.length} TERMINÉS</div>
    </div>
    <div class="cours-list">`;

  if (accessibleCours.length === 0) {
    coursHTML += `<div class="empty-state"><div class="empty-icon">📚</div>AUCUN COURS ACCESSIBLE</div>`;
  } else {
    accessibleCours.forEach(c => {
      const prog = progMap[c.id];
      const pct  = prog ? (prog.termine ? 100 : 50) : 0;
      const etC  = ET_COLOR[c.etiquette_requise] || 'var(--muted)';
      coursHTML += `
        <div class="cours-item">
          <div class="cours-icon">${getIcon(c.titre)}</div>
          <div class="cours-body">
            <div class="cours-name">${c.titre}
              <span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:${etC};letter-spacing:1px;margin-left:8px">${c.etiquette_requise}</span>
            </div>
            <div class="cours-bar-wrap">
              <div class="cours-bar"><div class="cours-bar-fill" style="width:${pct}%"></div></div>
              <div class="cours-pct">${pct}%</div>
            </div>
          </div>
          <div class="cours-check">${pct === 100 ? '✅' : pct === 50 ? '🔄' : '⭕'}</div>
        </div>`;
    });
  }
  coursHTML += '</div>';

  document.getElementById('pageContent').innerHTML =
    heroHTML + statsHTML + badgesHTML + coursHTML;
}

loadProfile().catch(err => {
  document.getElementById('pageContent').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">⚠️</div>
      ERREUR DE CONNEXION — VÉRIFIEZ LA CONFIG SUPABASE<br>
      <small style="font-size:10px;margin-top:8px;display:block">${err.message}</small>
    </div>`;
});
</script>
</body>
</html>
